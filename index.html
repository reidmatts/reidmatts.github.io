<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reid Matthew - Photography</title>
    <style>
        /* CSS Reset & Base Styles */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
            background-color: #121212; 
            color: #ffffff;
            line-height: 1.5;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }

        body.modal-open {
            overflow: hidden;
        }

        /* --- CENTRAL TOP HEADER --- */
        .central-header {
            width: 100%;
            background-color: #121212;
            padding: 25px 20px 15px; 
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            border-bottom: 1px solid #222; 
        }

        .central-header img.logo {
            max-width: 220px; 
            width: 100%; 
            height: auto;
            display: block;
            margin-bottom: 8px; 
        }

        .central-header p.quote {
            font-size: 1rem;
            font-weight: 300;
            color: #b0b0b0;
            letter-spacing: 1.5px;
            font-style: italic; 
        }

        /* --- MAIN PAGE LAYOUT --- */
        .page-container {
            display: flex;
            flex-direction: row-reverse; 
            align-items: flex-start; 
            width: 100%;
            max-width: 1600px; 
            margin: 0 auto;
        }

        /* --- RIGHT-SIDE STICKY SIDEBAR --- */
        .right-sidebar {
            width: 260px; 
            flex-shrink: 0; 
            padding: 40px;
            
            position: sticky; 
            top: 20px; 
            max-height: calc(100vh - 40px); 
            overflow-y: auto; 
            
            display: flex;
            flex-direction: column;
        }

        .right-sidebar nav ul {
            list-style: none;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .right-sidebar nav a {
            text-decoration: none;
            color: #9e9e9e;
            font-size: 0.95rem;
            transition: color 0.2s ease;
        }

        .right-sidebar nav a:hover {
            color: #ffffff;
        }

        .right-sidebar nav a.active {
            color: #ffffff;
            border-bottom: 2px solid #e5a93d; 
            padding-bottom: 2px;
        }

        /* --- MAIN CONTENT & MASONRY GRID --- */
        .main-content {
            flex: 1; 
            padding: 40px;
        }

        .image-grid {
            column-count: 3; 
            column-gap: 20px; 
        }

        .image-item {
            break-inside: avoid; 
            margin-bottom: 20px; 
            overflow: hidden; 
            border-radius: 4px;
        }

        .image-item img {
            width: 100%;
            height: auto;
            object-fit: contain; 
            display: block;
            transition: transform 0.4s ease, filter 0.4s ease;
            cursor: pointer; 
        }

        .image-item:hover img {
            transform: scale(1.05); 
            filter: brightness(0.8);
        }

        /* Helper class to hide sections smoothly */
        .hidden-section {
            display: none !important;
        }

        /* --- ABOUT ME SECTION --- */
        .about-section {
            display: flex;
            flex-direction: column;
            gap: 30px;
            max-width: 800px;
            margin: 0 auto;
            color: #e0e0e0;
            line-height: 1.8;
            font-size: 1.1rem;
        }

        .about-section h2 {
            color: #ffffff;
            font-size: 2rem;
            margin-bottom: 10px;
            border-bottom: 2px solid #e5a93d;
            padding-bottom: 10px;
            display: inline-block;
        }

        .about-image {
            width: 100%;
            max-height: 400px;
            object-fit: cover;
            border-radius: 8px;
            margin-bottom: 20px;
        }

        /* --- FULL SCREEN LIGHTBOX (MODAL) CSS --- */
        .modal {
            display: none; 
            position: fixed; 
            z-index: 1000; 
            left: 0;
            top: 0;
            width: 100%; 
            height: 100%; 
            background-color: rgba(0,0,0,0.9); 
            align-items: center;
            justify-content: center;
            cursor: zoom-out; 
        }

        .modal-content {
            margin: auto;
            display: block;
            max-width: 90%;
            max-height: 90%;
            object-fit: contain; 
            border-radius: 4px;
            cursor: default; 
            
            animation-name: zoom;
            animation-duration: 0.3s;
        }

        @keyframes zoom {
            from {transform:scale(0)}
            to {transform:scale(1)}
        }

        .close-modal {
            position: absolute;
            top: 20px;
            right: 35px;
            color: #f1f1f1;
            font-size: 50px;
            font-weight: bold;
            transition: 0.3s;
            cursor: pointer;
            z-index: 1001;
            line-height: 1;
        }

        /* --- RESPONSIVE DESIGN --- */
        @media (max-width: 1100px) {
            .image-grid { column-count: 2; }
        }

        @media (max-width: 768px) {
            .central-header { padding: 20px 20px 15px; }
            .central-header img.logo { max-width: 180px; }
            .page-container { flex-direction: column; }
            .right-sidebar {
                width: 100%;
                position: relative; 
                top: 0; 
                padding: 20px 20px 30px;
                text-align: center;
                border-bottom: 1px solid #222;
                max-height: none; 
                overflow-y: visible;
            }
            .right-sidebar nav ul {
                flex-direction: row;
                flex-wrap: wrap;
                justify-content: center;
                gap: 20px;
            }
            .main-content {
                width: 100%;
                padding: 30px 20px;
            }
            .modal-content {
                max-width: 95%;
                max-height: 95%;
            }
            .about-section h2 {
                font-size: 1.5rem;
            }
        }

        @media (max-width: 480px) {
            .image-grid { column-count: 1; }
        }
    </style>
</head>

    <div id="imageModal" class="modal">
        <span class="close-modal">&times;</span>
        <img class="modal-content" id="fullScreenImage">
    </div>

    <script>
        // 1. --- FULL SCREEN MODAL LOGIC ---
        const modal = document.getElementById("imageModal");
        const modalImg = document.getElementById("fullScreenImage");
        const body = document.body;
        
        // Function to bind click events to ALL images (even ones hidden initially)
        function attachModalEvents() {
            const images = document.querySelectorAll(".image-grid img");
            images.forEach(img => {
                // Remove existing to prevent duplicates, then add
                img.onclick = null; 
                img.onclick = function(){
                    modal.style.display = "flex";
                    modalImg.src = this.src;
                    body.classList.add('modal-open');
                }
            });
        }
        
        // Call it once on load
        attachModalEvents();

        function closeModal() {
            modal.style.display = "none";
            body.classList.remove('modal-open');
        }

        const closeBtn = document.querySelector(".close-modal");
        closeBtn.onclick = closeModal;

        modal.onclick = function(event) {
            if (event.target === modal) {
               closeModal();
            }
        }

        document.addEventListener('keydown', function(event) {
            if (event.key === 'Escape') {
                closeModal();
            }
        });

        // 2. --- MENU NAVIGATION LOGIC ---
        const nav2026 = document.getElementById("nav-2026");
        const navAllTime = document.getElementById("nav-all-time");
        const navArchives = document.getElementById("nav-archives"); // New Nav Link
        const navAbout = document.getElementById("nav-about");
        
        const grid2026 = document.getElementById("grid-2026");
        const gridAllTime = document.getElementById("grid-all-time");
        const gridArchives = document.getElementById("grid-archives"); // New Grid
        const aboutSection = document.getElementById("about-section");

        function hideAllSections() {
            grid2026.classList.add("hidden-section");
            gridAllTime.classList.add("hidden-section");
            gridArchives.classList.add("hidden-section"); // Hide new grid
            aboutSection.classList.add("hidden-section");
            
            nav2026.classList.remove("active");
            navAllTime.classList.remove("active");
            navArchives.classList.remove("active"); // Remove active from new link
            navAbout.classList.remove("active");
        }

        nav2026.onclick = function(event) {
            event.preventDefault(); 
            hideAllSections();
            nav2026.classList.add("active");
            grid2026.classList.remove("hidden-section");
        }

        navAllTime.onclick = function(event) {
            event.preventDefault(); 
            hideAllSections();
            navAllTime.classList.add("active");
            gridAllTime.classList.remove("hidden-section");
        }

        // NEW: Click event for Archives
        navArchives.onclick = function(event) {
            event.preventDefault(); 
            hideAllSections();
            navArchives.classList.add("active");
            gridArchives.classList.remove("hidden-section");
        }

        navAbout.onclick = function(event) {
            event.preventDefault();
            hideAllSections();
            navAbout.classList.add("active");
            aboutSection.classList.remove("hidden-section");
        }
    </script>
